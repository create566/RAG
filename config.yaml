agent:
  max_parallel_tools: 4
  model_call_limit: 8
  parallel_tool_execution: true
  session_model_call_limit: 40
  session_tool_call_limit: 30
  tool_call_limit: 6
database:
  mysql:
    database: super
    host: ${MYSQL_HOST:-localhost}
    password: ${MYSQL_PASSWORD:-password}
    port: 3306
    username: root
document:
  chunk_strategies:
  - structural
  - recursive
  - semantic
  - llm
  # 可用策略列表（用于前端展示选项）
  # 实际启用的策略由 default_strategy 控制
  # 组合模式: "structural,recursive"、"structural,recursive,semantic" 等
  default_strategy: structural,recursive
  max_child_chunks: 500
embedding:
  vllm:
    model: /models/BAAI/bge-small-zh-v1___5
    base_url: http://localhost:8011/v1
    dimension: 512
  dashscope:
    model: text-embedding-v1
  provider: vllm

graph_db:
  neo4j:
    password: ${NEO4J_PASSWORD:-password}
    uri: bolt://localhost:7687
    username: neo4j
  provider: neo4j

keyword_search:
  elasticsearch:
    hosts:
    - ${ELASTICSEARCH_HOSTS:-http://localhost:9200}
    index: super_agent_keywords
  provider: elasticsearch
llm:
  dashscope:
    api_key: ${DASHSCOPE_API_KEY}
    max_tokens: 4096
    model: qwen3.7-plus
    temperature: 0.3
  ollama:
    model: gemma4:e4b
    base_url: http://localhost:11434
  vllm:
    model: /models/Qwen/Qwen2-0___5B-Instruct
    base_url: http://localhost:8010/v1
    temperature: 0.3
    max_tokens: 2048
  deepseek:
    api_key: ${DEEPSEEK_API_KEY}
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com
    max_tokens: 8192
    temperature: 0.3
    reasoning_effort: high
  provider: deepseek

memory:
  recent_max_chars: 2200
  recent_turns: 4
  sliding_window_size: 10
  strategy: summary
  summary_max_chars: 1400
  summary_max_turns: 6


message_queue:
  kafka:
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    topic: super-agent-doc-processing

redis:
  host: ${REDIS_HOST:-localhost}
  port: 6379
  db: 9
  password: ${REDIS_PASSWORD:-}
  prefix: super_agent

object_storage:
  minio:
    access_key: minioadmin
    bucket: super-agent
    endpoint: ${MINIO_ENDPOINT:-localhost:9000}
    secret_key: minioadmin
    secure: false
  provider: minio


rerank:
  provider: vllm
  vllm:
    model: //models/BAAI/bge-reranker-base
    base_url: http://localhost:8012/v1
  siliconflow:
    api_key: ${SILICONFLOW_API_KEY}
    model: gte-rerank-v2


retrieval:
  child_chunk_size: 500
  enable_semantic_compress: true
  evidence_budget_per_child: 1500
  evidence_budget_total: 4000
  keyword_top_k: 10
  max_parent_chunks: 5
  min_keyword_score: 0.05
  min_vector_similarity: 0.08
  parent_chunk_size: 2000
  rrf_k: 50
  vector_top_k: 10

server:
  host: 0.0.0.0
  port: 8001
  reload: false

vector_store:
  chroma:
    collection_name: super_agent_docs
    persist_directory: ./data/chroma
  provider: chroma

mcp:
  servers:
    - name: "weather"
      endpoint: "http://localhost:8090/mcp"
      enabled: true
