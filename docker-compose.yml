# Super Agent Python Backend - Docker Compose Configuration
# 简化版：仅保留核心检索服务
# 使用: docker-compose up -d

services:
  # ===========================================
  # 应用服务
  # ===========================================
  super-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super-agent
    ports:
      - "8001:8001"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - SERVER_PORT=8001
      - REDIS_HOST=redis
    depends_on:
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    networks:
      - super-agent-network
    restart: unless-stopped
    volumes:
      - ./data/uploads:/app/data/uploads

  # ===========================================
  # 检索相关服务（必需）
  # ===========================================

  # Chroma - 向量数据库
  chroma:
    image: ghcr.io/chroma-core/chroma:0.5.0
    container_name: super-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    networks:
      - super-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - BM25关键词检索
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: super-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - super-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200/_cluster/health | grep -E '200|401' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Neo4j - 图数据库
  neo4j:
    image: neo4j:5.19
    container_name: super-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - super-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis - 高速缓存
  redis:
    image: redis:7-alpine
    container_name: super-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - super-agent-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ===========================================
# 数据卷
# ===========================================
volumes:
  chroma_data:
  es_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

# ===========================================
# 网络
# ===========================================
networks:
  super-agent-network:
    driver: bridge